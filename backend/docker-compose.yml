version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: medicare_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Retry4x
      POSTGRES_DB: medicare_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medicare_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: medicare_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medicare_network

  # Backend API Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medicare_backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:Retry4x@postgres:5432/medicare_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - medicare_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  medicare_network:
    driver: bridge
